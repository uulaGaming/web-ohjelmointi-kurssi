<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Galleria</title>
    <link href="../css/style.css" rel="stylesheet">
    <link rel="icon" type="image/gif" href="../favicon.gif">
    <meta name="author" content="uula">
    <meta name="keywords" content="hyvä, hieno, mahtava">
    <meta name="description" content="tää on tosi hyvä sivu">
  </head>
  <body>
    <nav>
      <h2 style="text-align: center">navigaatio</h2>
      <a href="../ansioluettelo.html"><button class="navbtn">Ansioluettelo</button></a>
      <a href="../kokemus.html"><button class="navbtn">Työkokemus</button></a>
      <a href="../portfolio"><button class="navbtn">Portfolio</button></a>
      <a href="../js.html"><button class="navbtn">hieno js sivu</button></a>
    </nav>
    <main>
      <h1>Galleria</h1>
      <hr>
      <section style="display: grid; grid-template-columns: auto auto auto auto">
      <script>
        const images = ["css.jpg", "yoy.jpg", "error.jpg", "eatbattle.jpg", "placeholder.jpg", "cvkuva.jpg", "sili.jpg", "russiandog.jpg", "yharon.gif"];
        
        images.forEach((image) => {
          document.write('<img width="128" height="128" role="button" src="../imgs/' + image + '" alt="kuva" onclick="openImage(this.src)" style="cursor: zoom-in">');
          console.log(image);
        });

        let imgIndex = 0;

        function openImage(image) {
          viewer.show();
          viewerlabel.innerHTML = image;
          viewerlabel.href = image;
          viewerimg.src = image;
        }

        function nextImage() {
          imgIndex++;
          if (imgIndex > images.length - 1) {
            imgIndex = 0;
          }
          let image = "../imgs/" + images[imgIndex]
          viewerlabel.innerHTML = image;
          viewerlabel.href = image;
          viewerimg.src = image;
          return imgIndex;
        }

        function previousImage() {
          imgIndex--;
          if (imgIndex < 0) {
            imgIndex = images.length - 1;
          }
          let image = "../imgs/" + images[imgIndex]
          viewerlabel.innerHTML = image;
          viewerlabel.href = image;
          viewerimg.src = image;
          return imgIndex;
        }
      </script>
      </section>
    </main>
    <dialog id="viewer">
    <div style="display: flex; flex-direction: column; align-items: center">
      <div style="display:flex; justify-content: space-between; width: 100%; margin: 8px">
        <button onclick="previousImage()">Taakse</button>
        <button onclick="viewer.close()">Sulje</button>
        <button onclick="nextImage()">Eteen</button>
      </div>
      <img id="viewerimg" src="../imgs/placeholder.jpg" alt="image" style="border: solid 8px white">
      <a id="viewerlabel">../imgs/placeholder.jpg</a>
    </div>
    </dialog>
  </body>
  <script>
  const viewer = document.getElementById('viewer');
  const viewerimg = document.getElementById('viewerimg');
  const viewerlabel = document.getElementById('viewerlabel');
  </script>
</html>
